name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: tp3front

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tp3front/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tp3front/package-lock.json
      - run: npm ci
      - run: npm run test

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tp3front/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  build:
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tp3front/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Verificar credenciales de Vercel
        id: vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT || echo "configured=true" >> /tmp/vercel_config
          else
            echo "configured=false" >> $GITHUB_OUTPUT || echo "configured=false" >> /tmp/vercel_config
            echo "::warning::Secrets de Vercel ausentes; se omite el deploy por Actions. Vercel despliega produccion por su integracion de GitHub."
          fi
          true
      - uses: actions/checkout@v4
        if: steps.vercel.outputs.configured == 'true'
      - uses: actions/setup-node@v4
        if: steps.vercel.outputs.configured == 'true'
        with:
          node-version: 20
      - run: npm i -g vercel
        if: steps.vercel.outputs.configured == 'true'
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        if: steps.vercel.outputs.configured == 'true'
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        if: steps.vercel.outputs.configured == 'true'
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        if: steps.vercel.outputs.configured == 'true'